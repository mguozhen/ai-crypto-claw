<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Grid Bot{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root { --pico-font-size: 15px; }
        .card { background: var(--pico-card-background-color); border-radius: 8px; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid var(--pico-muted-border-color); }
        .stat { display: inline-block; margin-right: 1.5rem; }
        .stat-label { font-size: 0.8rem; color: var(--pico-muted-color); }
        .stat-value { font-size: 1.3rem; font-weight: 700; }
        .green { color: #22c55e; }
        .red { color: #ef4444; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .tag-live { background: #fecaca; color: #991b1b; }
        .tag-demo { background: #fef08a; color: #854d0e; }
        .tag-main { background: #bfdbfe; color: #1e40af; }
        nav { margin-bottom: 1.5rem; }
        table { font-size: 0.9rem; }
    </style>
</head>
<body>
    <main class="container">
        <nav>
            <ul>
                <li><strong>🤖 Grid Bot Dashboard</strong></li>
            </ul>
            <ul>
                <li><a href="/">概览</a></li>
                <li><a href="/admin/users">用户管理</a></li>
                <li><a href="/admin/commands">命令日志</a></li>
                <li><a href="/logout" style="font-size:0.85rem;">退出</a></li>
            </ul>
        </nav>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
